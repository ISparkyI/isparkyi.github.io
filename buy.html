<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy App — Portfolio</title>
<meta name="description" content="Purchase an app — select the one you want and get in touch.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg-canvas" aria-hidden="true"></canvas>
<canvas id="trail-canvas" aria-hidden="true"></canvas>

<header class="topbar">
  <a href="./" class="topbar__logo" aria-label="Home">
    <img src="images/logo.png" alt="Logo">
  </a>
  <div class="topbar__dots" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
  <div class="topbar__cta">
    <a class="btn btn--ghost btn--small" href="index.html" data-i18n="nav_home">Home</a>
    <a class="btn btn--ghost btn--small" href="contact.html" data-i18n="cta_contact_us">Contact us</a>
  </div>
  <div class="lang-switch" role="group" aria-label="Language">
    <button type="button" data-lang="en">EN</button>
    <button type="button" data-lang="uk">UK</button>
  </div>
</header>

<main>
<div class="buy-notice">
  <span class="buy-notice__icon">⚠️</span>
  <div>
    <p data-i18n="buy_notice_build"></p>
    <p data-i18n="buy_notice_source"></p>
  </div>
</div>
<section class="section section--buy">

  <p class="section__eyebrow" data-i18n="buy_eyebrow">Purchase</p>
  <h2 class="section__title" data-i18n="buy_title">Buy an App</h2>
  <p class="hero__lead" data-i18n="buy_lead">Select the app you want to purchase, fill in your details, and I'll get back to you with payment instructions.</p>

  <!-- App picker -->
  <div class="app-picker" id="app-picker">
    <!-- cards rendered by buy.js -->
  </div>

  <!-- Purchase form -->
  <form
    id="buy-form"
    class="contact-form buy-form"
    action="https://formspree.io/f/xkolkekk"
    method="POST"
  >
    <!-- Hidden field — filled automatically when an app is selected -->
    <input type="hidden" id="selected-app" name="app" value="">

    <div class="field">
      <label for="buy-name" data-i18n="label_name">Name</label>
      <input type="text" id="buy-name" name="name" required autocomplete="name">
    </div>

    <div class="field">
      <label for="buy-email" data-i18n="label_email">Your email</label>
      <input type="email" id="buy-email" name="email" required autocomplete="email">
    </div>

    <div class="field">
      <label for="buy-message" data-i18n="label_message">Message <span class="field-optional" data-i18n="label_optional">(optional)</span></label>
      <textarea id="buy-message" name="message" rows="4" data-i18n-placeholder="buy_message_placeholder" placeholder="Any questions or notes about your purchase..."></textarea>
    </div>

    <p class="buy-form__note" id="buy-form-note" data-i18n="buy_select_note">← Select an app above before submitting.</p>

    <button type="submit" class="btn btn--primary" id="buy-submit-btn" data-i18n="buy_submit" disabled>Send Request</button>

    <p class="form-status" id="buy-form-status" role="status" aria-live="polite"></p>
  </form>

</section>
</main>

<footer class="footer">
  <p>© <span id="year"></span> · <span data-i18n="footer_text">All rights reserved.</span></p>
</footer>

<script src="projects-data.js"></script>
<script src="script.js"></script>
<script src="buy.js"></script>
</body>
</html>

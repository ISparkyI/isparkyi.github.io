<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портфоліо проєктів</title>
<meta name="description" content="Портфоліо проєктів — ігри, застосунки, вебсайти.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg-canvas" aria-hidden="true"></canvas>

<!-- ============ NAV ============ -->
<header class="topbar">
  <div class="topbar__dots" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
  <nav class="tabs" aria-label="Основна навігація">
    <a class="tab tab--active" href="Головна">home.js</a>
    <a class="tab" href="Зв'язатися">contact.js</a>
  </nav>
  <button class="menu-toggle" aria-label="Меню" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>

<main>

<!-- ============ HERO ============ -->
<section class="editor-pane hero">
  <p class="hero__lead">Ігри, застосунки та вебпроєкти — зібрані в одному місці.</p>
  <div class="hero__cta">
    <a class="btn btn--primary" href="#projects">Переглянути проєкти</a>
    <a class="btn btn--ghost" href="contact.html">Зв'язатися</a>
  </div>
</section>

<!-- ============ PROJECTS ============ -->
<section id="projects" class="section">
  <p class="section__eyebrow">projects.js</p>
  <h2 class="section__title">Проєкти</h2>

  <div class="filters" id="filters" role="group" aria-label="Фільтр за категорією">
    <!-- кнопки генеруються автоматично зі script.js -->
  </div>

  <div class="project-grid" id="project-grid">
    <!-- картки проєктів генеруються автоматично зі script.js -->
  </div>

  <p class="project-grid__empty" id="empty-state" hidden>У цій категорії поки немає проєктів.</p>
</section>

</main>

<footer class="footer">
  <p>© <span id="year"></span> · Портфоліо проєктів</p>
</footer>

<script src="projects-data.js"></script>
<script src="script.js"></script>
</body>
</html>
